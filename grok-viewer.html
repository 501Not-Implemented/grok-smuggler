<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok Export Viewer</title>
<style>
:root {
  --bg-primary: #0f0f13;
  --bg-secondary: #18181f;
  --bg-surface: #1e1e28;
  --bg-surface-hover: #262632;
  --text-primary: #e4e4ec;
  --text-secondary: #9e9eb0;
  --text-muted: #6c6c80;
  --border: #2a2a3a;
  --accent: #14b8a6;
  --human-bg: #1a2740;
  --human-border: #264060;
  --table-header-bg: #1a1a28;
  --table-alt-bg: #15151f;
  --code-bg: #0c0c14;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

/* Full-page landing drop zone */
#landing { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; cursor: pointer; border: 3px dashed transparent; transition: border-color 0.2s, background 0.2s; }
#landing.dragover { border-color: var(--accent); background: rgba(20,184,166,0.04); }
#landing.hidden { display: none; }
#landing h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
#landing .subtitle { color: var(--text-secondary); margin-bottom: 2.5rem; font-size: 0.95rem; }
.landing-icon { opacity: 0.25; margin-bottom: 1.5rem; }
.landing-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
.landing-hint { color: var(--text-muted); font-size: 0.8rem; margin-top: 2rem; }
.btn { font-size: 0.8rem; padding: 0.5rem 1.2rem; border-radius: 8px; background: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.4rem; }
.btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
.btn.primary { background: rgba(20,184,166,0.15); color: #2dd4bf; border-color: rgba(20,184,166,0.3); }
.btn.primary:hover { background: rgba(20,184,166,0.25); }
#fileInput, #folderInput { display: none; }

/* Drag overlay when viewing */
#dragOverlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15,15,19,0.92); flex-direction: column; align-items: center; justify-content: center; border: 3px dashed var(--accent); pointer-events: none; }
#dragOverlay.visible { display: flex; }
#dragOverlay svg { opacity: 0.4; margin-bottom: 1rem; }
#dragOverlay span { color: #2dd4bf; font-size: 1.1rem; font-weight: 600; }

/* Viewer layout */
#viewer { display: none; }
#viewer.active { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar { width: 260px; min-width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 1rem 0; display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; overflow: hidden; }
.sidebar-header { padding: 0.5rem 1rem 0.5rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; }
.sidebar-controls { padding: 0 0.75rem 0.5rem; display: flex; gap: 0.35rem; }
.sidebar-controls input { flex: 1; min-width: 0; padding: 0.35rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-primary); font-size: 0.78rem; outline: none; }
.sidebar-controls input:focus { border-color: var(--accent); }
.sidebar-controls input::placeholder { color: var(--text-muted); }
.sidebar-controls select { padding: 0.35rem 0.3rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); font-size: 0.72rem; outline: none; cursor: pointer; }
.sidebar-controls select:focus { border-color: var(--accent); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 0 0.5rem; }
.sidebar-no-results { padding: 1.5rem 0.75rem; text-align: center; color: var(--text-muted); font-size: 0.8rem; }
.sidebar-item { padding: 0.55rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.82rem; color: var(--text-secondary); transition: all 0.12s; margin-bottom: 2px; line-height: 1.35; position: relative; }
.sidebar-item:hover { background: var(--bg-surface); color: var(--text-primary); }
.sidebar-item.active { background: rgba(20,184,166,0.13); color: #2dd4bf; }
.sidebar-item .item-title { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; padding-right: 1.2rem; }
.sidebar-item .item-date { display: block; font-size: 0.7rem; color: var(--text-muted); margin-top: 0.2rem; }
.sidebar-item .del-conv { position: absolute; top: 0.45rem; right: 0.4rem; border: none; background: none; color: var(--text-muted); cursor: pointer; border-radius: 4px; display: none; outline: none; padding: 0.15rem 0.3rem; font-size: 0.85rem; line-height: 1; white-space: nowrap; }
.sidebar-item:hover .del-conv { display: block; }
.sidebar-item .del-conv:hover { background: rgba(239,68,68,0.2); color: #f87171; }
.sidebar-item .del-conv.armed { display: block; background: rgba(239,68,68,0.3); color: #f87171; font-size: 0.7rem; padding: 0.2rem 0.4rem; }
.sidebar-actions { padding: 0.75rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; }
.sidebar-actions .btn { flex: 1; justify-content: center; font-size: 0.75rem; padding: 0.4rem 0.5rem; }

/* Main content */
.main { flex: 1; min-width: 0; padding: 1.5rem 2rem 4rem; max-width: 900px; }

/* No-files state inside viewer (if all removed) */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text-muted); font-size: 0.95rem; }

.conv-header { padding: 0 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.conv-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.6rem; }
.conv-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
.conv-url { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; word-break: break-all; }
.conv-url a { color: var(--text-muted); text-decoration: none; }
.conv-url a:hover { color: var(--accent); }
.badge { font-size: 0.75rem; padding: 0.25rem 0.7rem; border-radius: 999px; background: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border); white-space: nowrap; }
.badge.accent { background: rgba(20,184,166,0.15); color: #2dd4bf; border-color: rgba(20,184,166,0.3); }
.badge.tag { background: rgba(34,197,94,0.12); color: #4ade80; border-color: rgba(34,197,94,0.25); }

.message { margin-bottom: 1.5rem; padding: 1.25rem 1.5rem; border-radius: 14px; }
.message.user { background: var(--human-bg); border: 1px solid var(--human-border); margin-left: 3rem; }
.message.ai { background: transparent; padding-left: 0; padding-right: 0; }
.msg-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
.msg-speaker { font-weight: 600; font-size: 0.9rem; }
.msg-speaker.user-name { color: #60a5fa; }
.msg-speaker.ai-name { color: var(--accent); }
.msg-time { font-size: 0.72rem; color: var(--text-muted); font-weight: 400; }
.del-msg { border: none; background: none; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; padding: 0.15rem 0.5rem; border-radius: 4px; margin-left: auto; opacity: 0; transition: all 0.12s; }
.message:hover .del-msg { opacity: 1; }
.del-msg:hover { background: rgba(239,68,68,0.15); color: #f87171; }
.del-msg.armed { opacity: 1; background: rgba(239,68,68,0.25); color: #f87171; }
.viewer-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.6rem 1.2rem; border-radius: 8px; background: rgba(15,15,19,0.95); color: #5eead4; font-size: 0.85rem; border: 1px solid rgba(20,184,166,0.3); z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.viewer-toast.visible { opacity: 1; }

.msg-content { line-height: 1.75; font-size: 0.95rem; color: var(--text-primary); }
.msg-content h1, .msg-content h2, .msg-content h3, .msg-content h4 { margin: 1.25rem 0 0.5rem; font-weight: 700; }
.msg-content h1 { font-size: 1.5rem; }
.msg-content h2 { font-size: 1.25rem; }
.msg-content h3 { font-size: 1.1rem; }
.msg-content p { margin-bottom: 0.75rem; }
.msg-content ul, .msg-content ol { margin: 0.5rem 0 0.75rem 1.5rem; }
.msg-content li { margin-bottom: 0.3rem; }
.msg-content li > ul, .msg-content li > ol { margin-top: 0.2rem; margin-bottom: 0.2rem; }
.msg-content a { color: #5eead4; text-decoration: none; }
.msg-content a:hover { text-decoration: underline; }
.msg-content img { max-width: 100%; height: auto; border-radius: 10px; margin: 0.5rem 0; border: 1px solid var(--border); }
.card-images { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.75rem 0; }
.card-images a { line-height: 0; }
.card-images img { max-width: 200px; max-height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); margin: 0; }
.img-hidden { display: none !important; }
.msg-content strong { color: #fff; font-weight: 700; }
.msg-content blockquote { border-left: 3px solid var(--accent); padding: 0.5rem 1rem; margin: 0.75rem 0; background: var(--bg-surface); border-radius: 0 8px 8px 0; color: var(--text-secondary); }
.msg-content hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

.table-wrap { overflow-x: auto; margin: 1rem 0; border-radius: 8px; border: 1px solid var(--border); }
.msg-content table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
.msg-content thead th { background: var(--table-header-bg); padding: 0.6rem 0.8rem; text-align: left; font-weight: 600; color: var(--text-primary); border-bottom: 2px solid var(--border); white-space: nowrap; }
.msg-content tbody td { padding: 0.55rem 0.8rem; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
.msg-content tbody tr:nth-child(even) { background: var(--table-alt-bg); }
.msg-content tbody tr:hover { background: var(--bg-surface-hover); }

.msg-content code { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; font-size: 0.85em; background: var(--code-bg); padding: 0.15em 0.4em; border-radius: 5px; border: 1px solid var(--border); }
.msg-content pre { margin: 1rem 0; border-radius: 10px; overflow-x: auto; background: var(--code-bg); border: 1px solid var(--border); position: relative; }
.msg-content pre code { display: block; padding: 1rem 1.25rem; border: none; background: none; line-height: 1.55; font-size: 0.85rem; }
.code-lang { position: absolute; top: 0; right: 0; font-size: 0.7rem; padding: 0.25rem 0.7rem; color: var(--text-muted); background: var(--bg-surface); border-radius: 0 10px 0 6px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); }

@media (max-width: 768px) {
  #viewer.active { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
  .main { padding: 1rem; }
  .message.user { margin-left: 0.5rem; }
  .msg-content table { font-size: 0.78rem; }
  .msg-content thead th, .msg-content tbody td { padding: 0.4rem 0.5rem; }
}
</style>
</head>
<body>

<div id="landing">
  <svg class="landing-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
  <h1>Grok Export Viewer</h1>
  <p class="subtitle">Drop files anywhere on this page, or pick files / a folder below</p>
  <div class="landing-actions">
    <button class="btn primary" id="pickFilesBtn">Choose Files</button>
    <button class="btn" id="pickFolderBtn">Open Folder</button>
  </div>
  <p class="landing-hint">Supports RevivalStack JSON exports (.json)</p>
</div>

<div id="viewer">
  <div class="sidebar">
    <div class="sidebar-header">Conversations</div>
    <div class="sidebar-controls">
      <input type="text" id="searchInput" placeholder="Search...">
      <select id="sortSelect">
        <option value="date-desc">Newest</option>
        <option value="date-asc">Oldest</option>
        <option value="title-asc">A → Z</option>
        <option value="title-desc">Z → A</option>
        <option value="msgs-desc">Most msgs</option>
        <option value="active-desc">Last active</option>
      </select>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="sidebar-actions">
      <button class="btn" id="addFilesBtn">+ Files</button>
      <button class="btn" id="addFolderBtn">+ Folder</button>
      <button class="btn primary" id="saveBtn" title="Download modified JSON">Save</button>
    </div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<div id="dragOverlay">
  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
  <span>Drop JSON files or folders to load</span>
</div>

<input type="file" id="fileInput" accept=".json" multiple>
<input type="file" id="folderInput" webkitdirectory>

<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script>
const conversations = [];
let activeIdx = -1;
let dragCounter = 0;
let savedFileHandle = null;
let searchQuery = '';
let sortMode = 'date-desc';

const $ = id => document.getElementById(id);
const landing = $('landing'), viewer = $('viewer');
const fileInput = $('fileInput'), folderInput = $('folderInput');
const sidebarList = $('sidebarList'), mainContent = $('mainContent');
const overlay = $('dragOverlay');

$('pickFilesBtn').addEventListener('click', e => { e.stopPropagation(); openFilePicker(); });
$('pickFolderBtn').addEventListener('click', e => { e.stopPropagation(); folderInput.click(); });
$('addFilesBtn').addEventListener('click', () => openFilePicker());
$('addFolderBtn').addEventListener('click', () => { folderInput.value = ''; folderInput.click(); });
$('saveBtn').addEventListener('click', saveConversations);
$('searchInput').addEventListener('input', e => { searchQuery = e.target.value; renderSidebar(); });
$('sortSelect').addEventListener('change', e => { sortMode = e.target.value; renderSidebar(); });
landing.addEventListener('click', () => openFilePicker());
fileInput.addEventListener('change', e => handleFiles(e.target.files));
folderInput.addEventListener('change', e => handleFiles(e.target.files));

async function openFilePicker() {
  if ('showOpenFilePicker' in window) {
    try {
      const handles = await window.showOpenFilePicker({
        multiple: true,
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
      });
      if (handles.length === 1) savedFileHandle = handles[0];
      const files = await Promise.all(handles.map(h => h.getFile()));
      handleFiles(files);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  fileInput.value = '';
  fileInput.click();
}

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('dragenter', e => {
  e.preventDefault();
  dragCounter++;
  if (dragCounter === 1) {
    overlay.classList.add('visible');
    landing.classList.add('dragover');
  }
});
document.addEventListener('dragleave', e => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; hideDrag(); }
});
document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  hideDrag();
  const items = e.dataTransfer.items;
  if (!items) { handleFiles(e.dataTransfer.files); return; }

  const canUseFSAPI = 'getAsFileSystemHandle' in DataTransferItem.prototype;
  const handlePromises = canUseFSAPI
    ? Array.from(items).map(it => it.getAsFileSystemHandle().catch(() => null))
    : null;

  const entries = [];
  for (const item of items) {
    const entry = item.webkitGetAsEntry?.();
    if (entry) entries.push(entry);
  }
  if (entries.some(en => en.isDirectory)) {
    readEntries(entries);
    return;
  }

  if (handlePromises) {
    Promise.all(handlePromises).then(async handles => {
      const jsonHandles = handles.filter(h => h?.kind === 'file' && h.name.endsWith('.json'));
      if (!jsonHandles.length) return;
      if (jsonHandles.length === 1) savedFileHandle = jsonHandles[0];
      handleFiles(await Promise.all(jsonHandles.map(h => h.getFile())));
    });
    return;
  }

  handleFiles(e.dataTransfer.files);
});

function hideDrag() {
  overlay.classList.remove('visible');
  landing.classList.remove('dragover');
}

function readEntries(entries) {
  const files = [];
  let pending = 0;
  function walk(entry) {
    if (entry.isFile) {
      pending++;
      entry.file(f => { if (f.name.endsWith('.json')) files.push(f); if (--pending === 0) handleFiles(files); });
    } else if (entry.isDirectory) {
      pending++;
      entry.createReader().readEntries(children => {
        children.forEach(walk);
        if (--pending === 0 && files.length) handleFiles(files);
      });
    }
  }
  entries.forEach(walk);
}

function handleFiles(fileList) {
  const jsonFiles = (Array.isArray(fileList) ? fileList : Array.from(fileList)).filter(f => f.name.endsWith('.json'));
  if (!jsonFiles.length) return;
  let loaded = 0;
  jsonFiles.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const items = Array.isArray(data) ? data : [data];
        items.forEach((item, idx) => {
          const norm = normalize(item);
          norm._fileName = Array.isArray(data) ? `${f.name}#${idx}` : f.name;
          if (!conversations.some(c => c._fileName === norm._fileName && c.url === norm.url)) {
            conversations.push(norm);
          }
        });
      } catch (err) { console.warn('Failed to parse', f.name, err); }
      if (++loaded >= jsonFiles.length) {
        if (activeIdx < 0) activeIdx = 0;
        showViewer();
      }
    };
    reader.readAsText(f);
  });
}

function normalize(data) {
  if (data.messages) {
    return {
      title: data.title || '', author: data.author || 'grok',
      date: data.date || '', url: data.url || '',
      tags: data.tags || [], exporter: data.exporter || '',
      messages: data.messages.map(m => {
        const msg = { role: m.author === 'user' ? 'user' : 'ai', content: m.content || '' };
        if (m.attachments) msg.attachments = m.attachments;
        if (m.timestamp) msg.timestamp = m.timestamp;
        return msg;
      })
    };
  }
  if (data.conversation) {
    return {
      title: '', author: data.platform || 'grok',
      date: data.exportDate || '', url: data.url || '',
      tags: [], exporter: data.exportVersion || '',
      messages: data.conversation.map((m, i) => ({ role: guessRole(m, i), content: m.content || '' }))
    };
  }
  throw new Error('Unrecognized format');
}

function guessRole(msg, idx) {
  const c = msg.content || '';
  if (msg.author === 'user') return 'user';
  if (msg.speaker && msg.speaker.toLowerCase() !== 'grok') return 'user';
  if (idx === 0 && c.length < 150) return 'user';
  return c.length > 300 ? 'ai' : (idx % 2 === 0 ? 'user' : 'ai');
}

function showViewer() {
  landing.classList.add('hidden');
  viewer.classList.add('active');
  renderSidebar();
  renderConversation(activeIdx);
}

function lastTimestamp(conv) {
  for (let i = conv.messages.length - 1; i >= 0; i--) {
    if (conv.messages[i].timestamp) return conv.messages[i].timestamp;
  }
  return 0;
}

function getFilteredIndices() {
  const q = searchQuery.toLowerCase().trim();
  let indices = conversations.map((_, i) => i);
  if (q) {
    indices = indices.filter(i => {
      const c = conversations[i];
      const title = (c.title || c._fileName || '').toLowerCase();
      if (title.includes(q)) return true;
      return c.messages.some(m => (m.content || '').toLowerCase().includes(q));
    });
  }
  indices.sort((a, b) => {
    const ca = conversations[a], cb = conversations[b];
    switch (sortMode) {
      case 'date-desc': return (cb.date || '').localeCompare(ca.date || '');
      case 'date-asc': return (ca.date || '').localeCompare(cb.date || '');
      case 'title-asc': return (ca.title || '').localeCompare(cb.title || '');
      case 'title-desc': return (cb.title || '').localeCompare(ca.title || '');
      case 'msgs-desc': return cb.messages.length - ca.messages.length;
      case 'active-desc': return (lastTimestamp(cb) || 0) - (lastTimestamp(ca) || 0);
      default: return 0;
    }
  });
  return indices;
}

function renderSidebar() {
  const filtered = getFilteredIndices();
  if (!filtered.length && searchQuery) {
    sidebarList.innerHTML = '<div class="sidebar-no-results">No matches</div>';
    return;
  }
  sidebarList.innerHTML = filtered.map(i => {
    const c = conversations[i];
    const title = c.title || firstLine(c) || c._fileName.replace('.json', '');
    const date = fmtDateShort(c.date);
    return `<div class="sidebar-item${i === activeIdx ? ' active' : ''}" data-idx="${i}">
      <span class="item-title">${esc(title)}</span>
      ${date ? `<span class="item-date">${date}</span>` : ''}
      <button class="del-conv" data-idx="${i}" title="Delete conversation">&times;</button>
    </div>`;
  }).join('');
  sidebarList.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.del-conv')) return;
      activeIdx = +el.dataset.idx;
      renderSidebar();
      renderConversation(activeIdx);
    });
  });
  sidebarList.querySelectorAll('.del-conv').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      armAction(btn, () => deleteConversation(+btn.dataset.idx));
    });
  });
}

function firstLine(conv) {
  const first = conv.messages.find(m => m.role === 'user');
  if (!first) return '';
  const text = first.content.slice(0, 60);
  return text.length < first.content.length ? text + '…' : text;
}

function fmtDate(ts) {
  if (!ts) return '';
  try { const d = new Date(ts); return isNaN(d) ? ts : d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
  catch { return ts; }
}

function fmtDateShort(ts) {
  if (!ts) return '';
  try { const d = new Date(ts); return isNaN(d) ? '' : d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return ''; }
}

function fmtTime(ms) {
  if (!ms) return '';
  try { const d = new Date(ms); return isNaN(d) ? '' : d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }
  catch { return ''; }
}

function renderMd(text) {
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
    let html = marked.parse(text);
    html = html.replace(/<pre><code class="language-(\w+)">/g, '<pre><span class="code-lang">$1</span><code class="language-$1">');
    html = html.replace(/<table>/g, '<div class="table-wrap"><table>').replace(/<\/table>/g, '</table></div>');
    return html;
  }
  return esc(text).replace(/\n/g, '<br>');
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function cleanGrokRenderTags(text) {
  text = text.replace(/<grok:render[^>]*>[\s\S]*?<\/grok:render>/g, '');
  text = text.replace(/<grok:render[^>]*>\s*\n\s*\d+\s*\n\s*"[^"]*"\s*\n\s*"[^"]*"\s*/g, '');
  return text;
}

function resolveAttachments(text, attachments) {
  if (!attachments || !attachments.length) return text;
  const byName = {};
  attachments.forEach(a => { if (a.name) byName[a.name] = a.data || a.url || ''; });
  return text.replace(/!\[([^\]]*)\]\(attachment:([^)]+)\)/g, (match, alt, name) => {
    const src = byName[name];
    return src ? `![${alt}](${src})` : match;
  });
}

function renderConversation(idx) {
  const conv = conversations[idx];
  if (!conv) { mainContent.innerHTML = '<div class="empty-state">Select a conversation</div>'; return; }
  const msgs = conv.messages;

  let h = '<div class="conv-header">';
  if (conv.title) h += `<div class="conv-title">${esc(conv.title)}</div>`;
  h += '<div class="conv-meta">';
  h += `<span class="badge accent">${esc(conv.author)}</span>`;
  if (conv.date) h += `<span class="badge">Created ${fmtDate(conv.date)}</span>`;
  h += `<span class="badge">${msgs.length} message${msgs.length !== 1 ? 's' : ''}</span>`;
  if (conv.exporter) h += `<span class="badge">v${esc(conv.exporter)}</span>`;
  conv.tags.forEach(t => { h += `<span class="badge tag">${esc(t)}</span>`; });
  h += '</div>';
  if (conv.url) h += `<div class="conv-url"><a href="${esc(conv.url)}" target="_blank">${esc(conv.url)}</a></div>`;
  h += '</div>';

  msgs.forEach((msg, mi) => {
    const isUser = msg.role === 'user';
    const cls = isUser ? 'user' : 'ai';
    const nameCls = isUser ? 'user-name' : 'ai-name';
    const label = isUser ? 'You' : 'Grok';
    let text = msg.content;
    text = cleanGrokRenderTags(text);
    if (msg.attachments) {
      text = resolveAttachments(text, msg.attachments);
    }
    const hasImages = msg.attachments?.some(a => a.data || a.url);
    const content = (isUser && !hasImages) ? esc(text) : renderMd(text);
    const time = fmtTime(msg.timestamp);
    h += `<div class="message ${cls}" data-msg="${mi}">
      <div class="msg-header"><span class="msg-speaker ${nameCls}">${label}</span>${time ? `<span class="msg-time">${time}</span>` : ''}<button class="del-msg" data-msg="${mi}">Delete</button></div>
      <div class="msg-content">${content}</div>
    </div>`;
  });

  mainContent.innerHTML = h;
  mainContent.scrollTop = 0;

  mainContent.querySelectorAll('.msg-content p, .msg-content li').forEach(el => {
    const imgs = Array.from(el.querySelectorAll(':scope > img, :scope > a > img'))
      .filter(img => !img.src.startsWith('data:'));
    if (!imgs.length) return;
    const wrap = document.createElement('div');
    wrap.className = 'card-images';
    imgs.forEach(img => {
      const node = (img.parentElement?.tagName === 'A' && img.parentElement.parentElement === el) ? img.parentElement : img;
      wrap.appendChild(node);
    });
    el.appendChild(wrap);
  });

  mainContent.querySelectorAll('.msg-content img').forEach(img => {
    img.addEventListener('error', function() {
      this.classList.add('img-hidden');
      const parent = this.parentElement;
      if (parent?.tagName === 'A' && !parent.textContent.trim()) parent.classList.add('img-hidden');
    });
  });

  mainContent.querySelectorAll('.del-msg').forEach(btn => {
    btn.addEventListener('click', () => armAction(btn, () => deleteMessage(idx, +btn.dataset.msg)));
  });
}

function armAction(btn, action) {
  if (btn.classList.contains('armed')) {
    clearTimeout(btn._armTimer);
    btn.classList.remove('armed');
    btn.textContent = btn._armOriginal;
    action();
    return;
  }
  btn._armOriginal = btn.textContent;
  btn.textContent = 'Sure?';
  btn.classList.add('armed');
  btn._armTimer = setTimeout(() => {
    btn.classList.remove('armed');
    btn.textContent = btn._armOriginal;
  }, 2000);
}

function deleteConversation(idx) {
  conversations.splice(idx, 1);
  if (conversations.length === 0) {
    activeIdx = -1;
    landing.classList.remove('hidden');
    viewer.classList.remove('active');
    return;
  }
  if (activeIdx >= conversations.length) activeIdx = conversations.length - 1;
  else if (activeIdx > idx) activeIdx--;
  else if (activeIdx === idx) activeIdx = Math.min(idx, conversations.length - 1);
  renderSidebar();
  renderConversation(activeIdx);
}

function deleteMessage(convIdx, msgIdx) {
  conversations[convIdx]?.messages.splice(msgIdx, 1);
  renderConversation(convIdx);
  renderSidebar();
}

function buildExportData() {
  const exported = conversations.map(c => ({
    title: c.title, author: c.author, date: c.date, url: c.url,
    tags: c.tags, exporter: c.exporter,
    messages: c.messages.map(m => {
      const out = { author: m.role === 'user' ? 'user' : 'ai', content: m.content };
      if (m.timestamp) out.timestamp = m.timestamp;
      if (m.attachments) out.attachments = m.attachments;
      return out;
    })
  }));
  return exported.length === 1 ? exported[0] : exported;
}

async function writeToHandle(handle, json) {
  const writable = await handle.createWritable();
  await writable.write(json);
  await writable.close();
}

async function saveConversations() {
  if (!conversations.length) return;
  const json = JSON.stringify(buildExportData(), null, 2);

  if ('showSaveFilePicker' in window) {
    try {
      if (savedFileHandle) {
        await writeToHandle(savedFileHandle, json);
        toast('Saved');
        return;
      }
      savedFileHandle = await window.showSaveFilePicker({
        suggestedName: 'grok-conversations.json',
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
      });
      await writeToHandle(savedFileHandle, json);
      toast('Saved to new file');
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      savedFileHandle = null;
    }
  }
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `grok-edited_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded');
}

function toast(msg) {
  let el = document.querySelector('.viewer-toast');
  if (!el) { el = document.createElement('div'); el.className = 'viewer-toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('visible'), 2000);
}

const rawSearch = location.search.slice(1);
const loadParam = rawSearch.split('&').find(p => p.startsWith('load='));
if (loadParam) {
  const files = decodeURIComponent(loadParam.slice(5)).split(',');
  let loaded = 0;
  files.forEach(f => {
    fetch(f).then(r => r.json()).then(data => {
      const norm = normalize(data);
      norm._fileName = f.split('/').pop();
      conversations.push(norm);
    }).catch(err => console.error('Failed to load', f, err))
    .finally(() => { if (++loaded >= files.length && conversations.length) { activeIdx = 0; showViewer(); } });
  });
}
</script>
